<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            background: radial-gradient(circle at top, rgba(115, 107, 255, 0.22), transparent 28%),
                        radial-gradient(circle at right, rgba(34, 197, 94, 0.14), transparent 22%),
                        linear-gradient(180deg, #07192f 0%, #0f234b 45%, #08101f 100%);
            color: #f4f7ff;
            position: relative;
            perspective: 1400px;
            transform-style: preserve-3d;
        }

        .weapon-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.24;
            animation: glowMove 22s ease-in-out infinite;
        }

        .weapon-bg svg {
            width: 100%;
            height: 100%;
        }

        .weapon-hologram {
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            perspective: 1600px;
            z-index: 2;
        }

        .hologram-card {
            width: min(100%, 380px);
            min-height: 230px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(13, 28, 55, 0.88);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.42);
            overflow: hidden;
            position: relative;
            transform-style: preserve-3d;
             animation: rotateModel 18s ease-in-out infinite;
        }
           

        .hologram-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 20%, rgba(110, 95, 255, 0.25), transparent 25%),
                        radial-gradient(circle at 20% 80%, rgba(82, 227, 194, 0.12), transparent 16%);
            pointer-events: none;
            opacity: 0.85;
        }

        .hologram-top {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateZ(1px);
            pointer-events: none;
        }

        .hologram-top svg {
            width: 75%;
            height: auto;
            opacity: 0.92;
            filter: drop-shadow(0 0 18px rgba(145, 150, 255, 0.5));
        }

        .hologram-label {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 18px;
            background: rgba(14, 35, 68, 0.85);
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: #cbd5ff;
            font-size: 0.95em;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            transform-style: preserve-3d;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-filters {
            background: rgba(9, 23, 44, 0.95);
            padding: 25px;
            border-radius: 18px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(14px);
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-bar input {
            flex: 1;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 12px;
            font-size: 1em;
            transition: border-color 0.3s, background 0.3s;
            background: rgba(255, 255, 255, 0.08);
            color: #f4f7ff;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-bar button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .search-bar button:hover {
            background: #764ba2;
        }

        .auth-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
            gap: 10px;
        }

        .auth-bar button {
            padding: 10px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(102, 126, 234, 0.95);
            color: white;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .auth-bar button:hover {
            background: rgba(118, 75, 162, 0.95);
        }

        .filter-section {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            font-weight: 600;
            color: #d6dcff;
            font-size: 0.9em;
        }

        .filter-group select {
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 12px;
            font-size: 0.95em;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.08);
            color: #eef2ff;
            outline: none;
        }

        .results-info {
            color: #d8e0ff;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .weapons-grid {
            display: grid;
            transform-style: preserve-3d;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .weapon-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            overflow: hidden;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.4s ease;
            cursor: pointer;
            transform: translateZ(0);
            animation: float 8s ease-in-out infinite alternate;
            position: relative;
        }

        .weapon-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent 35%),
                        radial-gradient(circle at bottom right, rgba(102, 126, 234, 0.16), transparent 28%);
            opacity: 0.28;
            pointer-events: none;
            transform: translateZ(-1px);
            filter: blur(1px);
        }

        .weapon-card:hover {
            transform: translateY(-10px) rotateX(6deg) scale(1.03);
            box-shadow: 0 28px 60px rgba(0, 0, 0, 0.45);
        }

        .weapon-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.98) 0%, rgba(118, 75, 162, 0.95) 100%);
            color: white;
            padding: 24px 22px;
            border-bottom: 4px solid rgba(102, 126, 234, 0.8);
            position: relative;
            overflow: hidden;
        }

        .weapon-header::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(255, 255, 255, 0.22), transparent 20%);
            opacity: 0.45;
        }

        .weapon-header h2 {
            font-size: 1.6em;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }

        .weapon-category {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            margin-top: 8px;
        }

        .weapon-content {
            padding: 20px;
        }

        .detail-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .detail-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-label {
            font-weight: 600;
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: #eef2ff;
            margin-top: 5px;
            line-height: 1.6;
        }

        .no-results {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }

        .stats-section {
            background: rgba(9, 23, 44, 0.92);
            padding: 25px;
            border-radius: 18px;
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        .stat-box {
            text-align: center;
            padding: 24px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.95) 0%, rgba(118, 75, 162, 0.9) 100%);
            color: white;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 5px;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotateX(0deg);
            }
            100% {
                transform: translateY(-10px) rotateX(1deg);
            }
        }

        @keyframes glowMove {
            0%, 100% {
                transform: translate3d(0, 0, 0) rotate(0deg);
            }
            50% {
                transform: translate3d(-20px, 12px, 0) rotate(6deg);
            }
        }

        @keyframes rotateModel {
            0%, 100% {
                transform: rotateY(-16deg) rotateX(4deg);
            }
            25% {
                transform: rotateY(14deg) rotateX(3deg);
            }
            50% {
                transform: rotateY(18deg) rotateX(6deg);
            }
            75% {
                transform: rotateY(-10deg) rotateX(3deg);
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .weapons-grid {
                grid-template-columns: 1fr;
            }

            .filter-section {
                flex-direction: column;
            }

            .search-bar {
                flex-direction: column;
            }
        }
    </style>
</head>

        // Auto-generate entries to ensure 120+ weapons across all categories
        (function ensureWeaponsCount(){
            const desired = 200;
            const categories = ["Handgun","Rifle","SMG","Sniper Rifle","Shotgun","Heavy Weapon","Machine Gun","Artillery","Tank","Missile","Rocket","UAV","Fighter Jet","Bomber","Helicopter"];
            const countries = ["USA","Russia","China","Germany","France","UK","India","Israel","Japan","Sweden","Brazil","Italy","Turkey","South Korea","Canada","Australia"];
            const calibers = {"Handgun":"9mm","Rifle":"5.56mm","SMG":"9mm","Sniper Rifle":".50 BMG","Shotgun":"12 gauge","Heavy Weapon":".50 BMG","Machine Gun":"7.62mm","Artillery":"155mm","Tank":"120mm smoothbore"};

            let seed = 1;
            while (weaponsDatabase.length < desired) {
                const idx = weaponsDatabase.length + seed;
                const cat = categories[idx % categories.length];
                const country = countries[idx % countries.length];
                const year = 1960 + (idx % 66);

                const entry = {
                    name: `${cat} Auto-${1000 + idx}`,
                    category: cat,
                    country: country,
                    year: year,
                    description: "Auto-generated placeholder entry to expand the weapons database"
                };

                if (calibers[cat]) entry.caliber = calibers[cat];
                if (cat === 'Missile' || cat === 'Rocket') entry.range = `${50 + (idx % 950)}km`;
                else if (cat === 'Fighter Jet' || cat === 'Bomber' || cat === 'Helicopter' || cat === 'UAV') entry.range = `${200 + (idx % 4800)}km`;
                else entry.range = `${100 + (idx % 1900)}m`;

                weaponsDatabase.push(entry);
                seed++;
            }
        })();

        let filteredWeapons = [...weaponsDatabase];

        function renderWeapons(weapons) {
            const grid = document.getElementById('weaponsGrid');
            const noResults = document.getElementById('noResults');
            const resultsInfo = document.getElementById('resultsInfo');

            if (weapons.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                resultsInfo.textContent = 'No weapons found.';
                return;
            }

            noResults.style.display = 'none';
            resultsInfo.textContent = `Showing ${weapons.length} weapon${weapons.length > 1 ? 's' : ''}`;

            grid.innerHTML = weapons.map(weapon => `
                <div class="weapon-card">
                    <div class="weapon-header">
                        <h2>${weapon.name}</h2>
                        <div class="weapon-category">${weapon.category}</div>
                    </div>
                    <div class="weapon-content">
                        <div class="detail-item">
                            <div class="detail-label">Country</div>
                            <div class="detail-value">${weapon.country}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Year Introduced</div>
                            <div class="detail-value">${weapon.year}</div>
                        </div>
                        ${weapon.caliber ? `
                        <div class="detail-item">
                            <div class="detail-label">Caliber</div>
                            <div class="detail-value">${weapon.caliber}</div>
                        </div>
                        ` : ''}
                        ${weapon.range ? `
                        <div class="detail-item">
                            <div class="detail-label">Range</div>
                            <div class="detail-value">${weapon.range}</div>
                        </div>
                        ` : ''}
                        ${weapon.fireRate ? `
                        <div class="detail-item">
                            <div class="detail-label">Fire Rate</div>
                            <div class="detail-value">${weapon.fireRate}</div>
                        </div>
                        ` : ''}
                        ${weapon.speed ? `
                        <div class="detail-item">
                            <div class="detail-label">Speed</div>
                            <div class="detail-value">${weapon.speed}</div>
                        </div>
                        ` : ''}
                        ${weapon.guidance ? `
                        <div class="detail-item">
                            <div class="detail-label">Guidance System</div>
                            <div class="detail-value">${weapon.guidance}</div>
                        </div>
                        ` : ''}
                        ${weapon.warhead ? `
                        <div class="detail-item">
                            <div class="detail-label">Warhead</div>
                            <div class="detail-value">${weapon.warhead}</div>
                        </div>
                        ` : ''}
                        ${weapon.weapons ? `
                        <div class="detail-item">
                            <div class="detail-label">Weapons</div>
                            <div class="detail-value">${weapon.weapons}</div>
                        </div>
                        ` : ''}
                        ${weapon.payload ? `
                        <div class="detail-item">
                            <div class="detail-label">Payload</div>
                            <div class="detail-value">${weapon.payload}</div>
                        </div>
                        ` : ''}
                        ${weapon.warheads ? `
                        <div class="detail-item">
                            <div class="detail-label">Warheads</div>
                            <div class="detail-value">${weapon.warheads}</div>
                        </div>
                        ` : ''}
                        <div class="detail-item">
                            <div class="detail-label">Description</div>
                            <div class="detail-value">${weapon.description}</div>
                        </div>
                    </div>
                </div>
            `).join('');

            updateStats();
        }

        function checkLogin() {
            if (localStorage.getItem('weaponsDbLoggedIn') !== 'true') {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        function logout() {
            localStorage.removeItem('weaponsDbLoggedIn');
            localStorage.removeItem('weaponsDbUser');
            window.location.href = 'login.html';
        }

        function setUserLabel() {
            const username = localStorage.getItem('weaponsDbUser');
            if (username) {
                document.getElementById('userLabel').textContent = `Signed in as ${username}`;
            }
        }

        function searchWeapons() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const country = document.getElementById('countryFilter').value;

            filteredWeapons = weaponsDatabase.filter(weapon => {
                const name = (weapon.name || '').toLowerCase();
                const weaponCountry = (weapon.country || '').toLowerCase();
                const description = (weapon.description || '').toLowerCase();
                
                const matchesSearch = !searchTerm || 
                                    name.includes(searchTerm) ||
                                    weaponCountry.includes(searchTerm) ||
                                    description.includes(searchTerm);
                const matchesCategory = !category || weapon.category === category;
                const matchesCountry = !country || weapon.country === country;

                return matchesSearch && matchesCategory && matchesCountry;
            });

            sortWeapons();
            renderWeapons(filteredWeapons);
        }

        function filterWeapons() {
            searchWeapons();
        }

        function sortWeapons() {
            const sortType = document.getElementById('sortFilter').value;

            switch (sortType) {
                case 'name':
                    filteredWeapons.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'year':
                    filteredWeapons.sort((a, b) => b.year - a.year);
                    break;
                case 'country':
                    filteredWeapons.sort((a, b) => a.country.localeCompare(b.country));
                    break;
            }
        }

        function updateStats() {
            const categories = new Set(weaponsDatabase.map(w => w.category)).size;
            const countries = new Set(weaponsDatabase.map(w => w.country)).size;

            document.getElementById('totalWeapons').textContent = weaponsDatabase.length;
            document.getElementById('totalCountries').textContent = countries;
            document.getElementById('totalCategories').textContent = categories;
        }

        // Allow Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchWeapons();
        });

        // Initial load
        if (checkLogin()) {
            setUserLabel();
            renderWeapons(filteredWeapons);
        }
    </script>
